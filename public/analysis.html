<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Analysis</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        .address-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.675rem;
            margin-top: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 0.9375rem;
            margin-top: 0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-content {
            color: var(--text-light);
            line-height: 1.6;
            font-size: 0.7125rem;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            width: 100%;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(79, 70, 229, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error {
            background: #fef2f2;
            color: #991b1b;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #fee2e2;
            text-align: center;
            width: 100%;
        }

        #raw-output {
            margin-top: 2rem;
            font-size: 0.6rem;
            color: var(--text-light);
            white-space: pre-wrap;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div id="address-display" class="address-badge">Loading address...</div>
        </header>

        <div id="loading" class="loading">
            <div class="spinner"></div>
        </div>

        <div id="results" class="grid"></div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="raw-output"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let address = urlParams.get('address');
        const defaultAddress = "Best Buy, 1717, Harrison Street, Mission District, San Francisco, California, 94103, United States";

        if (!address) {
            address = defaultAddress;
        }

        document.getElementById('address-display').textContent = address;

        async function fetchAnalysis() {
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');

            try {
                const response = await fetch('/analyze-address', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                loadingDiv.style.display = 'none';

                // Expected format from LLM: Array of {category, title, description, risk_level}
                const risks = data.risks || [];

                risks.forEach((risk, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.animationDelay = `${index * 0.1}s`;

                    let icon = '🛡️';
                    if (risk.title.toLowerCase().includes('crime')) icon = '👮';
                    else if (risk.title.toLowerCase().includes('earthquake')) icon = '🫨';
                    else if (risk.title.toLowerCase().includes('weather') || risk.title.toLowerCase().includes('flood')) icon = '⛈️';
                    else if (risk.title.toLowerCase().includes('construction')) icon = '🏗️';

                    card.innerHTML = `
                        <h2><span>${icon}</span> ${risk.title}</h2>
                        <div class="card-content">${risk.description}</div>
                        <div style="margin-top: 1rem; font-size: 0.6rem; font-weight: 700; color: ${getRiskColor(risk.risk_level)}">
                            RISK LEVEL: ${risk.risk_level.toUpperCase()}
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (err) {
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.textContent = "Failed to load risk analysis: " + err.message;
                console.error(err);
            }
        }

        function getRiskColor(level) {
            level = level.toLowerCase();
            if (level === 'high') return '#ef4444';
            if (level === 'medium') return '#eab308';
            if (level === 'low') return '#22c55e';
            return '#64748b';
        }

        fetchAnalysis();
    </script>
</body>

</html>
