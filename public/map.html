<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body,
        html,
        #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #f8fafc;
        }

        .leaflet-container {
            background: #f8fafc !important;
        }

        /* Custom Tooltip Styling for Light Mode */
        .custom-tooltip {
            background: rgba(255, 255, 255, 0.95) !important;
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
            color: #1e293b !important;
            border-radius: 8px !important;
            padding: 8px 12px !important;
            font-weight: 600 !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1) !important;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="gw-embedded-ts.js"></script>
    <script>
        GwCrossOriginExternal.init("http://localhost:8180");
        // Initialize map centered on Berlin
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([52.5200, 13.4050], 12);

        // Add a premium light-themed tile layer (CartoDB Voyager)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Fetch polygon data from the deployed service
        async function fetchPolygon() {
            try {
                // Get the address from the map.html URL (e.g., map.html?address=Hamburg)
                const urlParams = new URLSearchParams(window.location.search);
                const addressParams = urlParams.get('address') || "Alexanderstraße 15, 10178 Berlin, Germany";

                // Call the API with the address as a query parameter
                const response = await fetch(`https://address-service-six.vercel.app/generate-polygon?address=${encodeURIComponent(addressParams)}`);

                const data = await response.json();

                if (data.regions && data.regions.length > 0) {
                    // Center map on the returned main center
                    map.setView([data.center.lat, data.center.lng], 13);
                    const allBounds = L.latLngBounds();

                    data.regions.forEach((region, index) => {
                        // Convert API response {lat, lng} objects to Leaflet [lat, lng] arrays
                        const regionCoords = region.polygon_bounds.map(p => [p.lat, p.lng]);

                        // Determine color based on risk level
                        let polygonColor = '#4f46e5'; // default blue-ish
                        if (region.risk_level === 'low') polygonColor = '#22c55e'; // green
                        else if (region.risk_level === 'medium') polygonColor = '#eab308'; // yellow
                        else if (region.risk_level === 'high') polygonColor = '#ef4444'; // red

                        // Create the polygon
                        const polygon = L.polygon(regionCoords, {
                            color: polygonColor,
                            fillColor: polygonColor,
                            fillOpacity: 0.25,
                            weight: 2,
                            smoothFactor: 1
                        }).addTo(map);

                        // Add a tooltip
                        polygon.bindTooltip(`<strong>${data.input_address} - Area ${index + 1}</strong><br>Risk Level: <span style="text-transform: capitalize; color: ${polygonColor}; font-weight: bold;">${region.risk_level}</span>`, {
                            permanent: false,
                            direction: "top",
                            className: "custom-tooltip"
                        });

                        // Add interactive effects
                        polygon.on('mouseover', function (e) {
                            this.setStyle({
                                fillOpacity: 0.4,
                                weight: 4
                            });
                        });

                        polygon.on('mouseout', function (e) {
                            this.setStyle({
                                fillOpacity: 0.25,
                                weight: 2
                            });
                        });

                        // Extend bounds to encompass all polygons
                        allBounds.extend(polygon.getBounds());
                    });

                    // Zoom to fit all generated regions
                    map.fitBounds(allBounds, { padding: [50, 50] });
                }
            } catch (error) {
                console.error("Error fetching polygon from API:", error);
            }
        }

        fetchPolygon();

        GwCrossOriginExternal.setValues({
            parentValue: "this is test here"          // "parentValue" matches the EmbeddedWidgetRef name
        }).then(function () {
            console.log("PCF widget updated");
        });
    </script>

</body>

</html>
